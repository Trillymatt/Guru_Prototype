version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install dependencies at root (includes workspaces)
        - npm ci
    build:
      commands:
        # Build from root using workspace command
        - npm run build:admin
  artifacts:
    # Output directory for admin build
    baseDirectory: packages/admin/dist
    files:
      - '**/*'
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache'
  cache:
    paths:
      - node_modules/**/*
      - packages/*/node_modules/**/*
customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>'
    target: /index.html
    status: '200'
