version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install dependencies at root (includes workspaces)
        - npm ci
    build:
      commands:
        # Build the correct portal based on branch
        - |
          if [ "$AWS_BRANCH" = "admin" ]; then
            npm run build:admin
            cp -r packages/admin/dist ./build_output
          elif [ "$AWS_BRANCH" = "tech" ]; then
            npm run build:tech
            cp -r packages/technician/dist ./build_output
          else
            npm run build:customer
            cp -r packages/customer/dist ./build_output
          fi
  artifacts:
    baseDirectory: build_output
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - packages/*/node_modules/**/*
